<!DOCTYPE html>
<html>
<head>
<title>Turbo Drift</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
background:#222;
border:4px solid white;
}

</style>

</head>

<body>

<h1>Turbo Drift</h1>
<p>Arrow Keys = Drive | SPACE = Drift Brake</p>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let car = {
x:450,
y:250,
angle:0,
speed:0,
maxSpeed:7,
acc:0.25,
friction:0.97,
turn:0.05,
drift:0.90
};

let driftScore = 0;

const track = {
outer:{x:100,y:80,w:700,h:340},
inner:{x:250,y:200,w:400,h:100}
};

function update(){

if(keys["ArrowUp"]) car.speed += car.acc;
if(keys["ArrowDown"]) car.speed -= car.acc;

if(car.speed > car.maxSpeed) car.speed = car.maxSpeed;
if(car.speed < -car.maxSpeed) car.speed = -car.maxSpeed;

let turning = false;

if(keys["ArrowLeft"]){
car.angle -= car.turn * (car.speed/2);
turning = true;
}

if(keys["ArrowRight"]){
car.angle += car.turn * (car.speed/2);
turning = true;
}

if(keys[" "]){
car.speed *= car.drift;
driftScore += Math.abs(car.speed)*2;
}

car.x += Math.cos(car.angle) * car.speed;
car.y += Math.sin(car.angle) * car.speed;

car.speed *= car.friction;

checkCollision();

if(turning && Math.abs(car.speed) > 2){
driftScore += 0.5;
}

}

function checkCollision(){

if(
car.x < track.outer.x ||
car.x > track.outer.x + track.outer.w ||
car.y < track.outer.y ||
car.y > track.outer.y + track.outer.h ||

(car.x > track.inner.x &&
car.x < track.inner.x + track.inner.w &&
car.y > track.inner.y &&
car.y < track.inner.y + track.inner.h)
){

car.speed *= -0.4;

}

}

function drawTrack(){

ctx.fillStyle="#666";
ctx.fillRect(track.outer.x,track.outer.y,track.outer.w,track.outer.h);

ctx.fillStyle="#111";
ctx.fillRect(track.inner.x,track.inner.y,track.inner.w,track.inner.h);

}

function drawCar(){

ctx.save();

ctx.translate(car.x,car.y);
ctx.rotate(car.angle);

ctx.fillStyle="red";
ctx.fillRect(-20,-10,40,20);

ctx.fillStyle="black";
ctx.fillRect(5,-8,10,16);

ctx.restore();

}

function drawUI(){

ctx.fillStyle="white";
ctx.font="20px Arial";

ctx.fillText("Drift Score: "+Math.floor(driftScore),20,30);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawTrack();
drawCar();
drawUI();

}

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
