<!DOCTYPE html>
<html>
<head>
<title>Turbo Drift</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:10px;
}

canvas{
background:#333;
border:4px solid white;
}

</style>

</head>

<body>

<h1>Turbo Drift</h1>
<p>Use Arrow Keys to Drive</p>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let car = {
x:450,
y:250,
angle:0,
speed:0,
maxSpeed:6,
acceleration:0.2,
friction:0.96,
turnSpeed:0.05
};

let driftScore = 0;

function update(){

if(keys["ArrowUp"]){
car.speed += car.acceleration;
}

if(keys["ArrowDown"]){
car.speed -= car.acceleration;
}

if(car.speed > car.maxSpeed) car.speed = car.maxSpeed;
if(car.speed < -car.maxSpeed) car.speed = -car.maxSpeed;

if(keys["ArrowLeft"]){
car.angle -= car.turnSpeed * (car.speed/2);
driftScore += Math.abs(car.speed);
}

if(keys["ArrowRight"]){
car.angle += car.turnSpeed * (car.speed/2);
driftScore += Math.abs(car.speed);
}

car.x += Math.cos(car.angle) * car.speed;
car.y += Math.sin(car.angle) * car.speed;

car.speed *= car.friction;

if(car.x < 0) car.x = canvas.width;
if(car.x > canvas.width) car.x = 0;
if(car.y < 0) car.y = canvas.height;
if(car.y > canvas.height) car.y = 0;

}

function drawTrack(){

ctx.fillStyle = "#555";

ctx.fillRect(100,100,700,300);

ctx.fillStyle = "#222";

ctx.fillRect(200,200,500,100);

}

function drawCar(){

ctx.save();

ctx.translate(car.x,car.y);
ctx.rotate(car.angle);

ctx.fillStyle="red";
ctx.fillRect(-20,-10,40,20);

ctx.restore();

}

function drawUI(){

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Drift Score: "+Math.floor(driftScore),20,30);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawTrack();
drawCar();
drawUI();

}

function gameLoop(){

update();
draw();
requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
